[project]
name = "django-mongodb-cli"
version = "0.1.0"
dependencies = [
    "GitPython",
    "Sphinx",
    "click",
    "django-debug-toolbar",
    "django-extensions",
    "django-admin-tui",
    "freezegun",
    "psycopg2",
    "pytest",
    "pytest-django",
    "python-webpack-boilerplate",
    "requests",
    "setuptools",
    "toml",
]

[tool.setuptools]
packages = ["django_mongodb_cli"]

[tool.django_mongodb_cli]
dev = [
    "django-allauth @ git+ssh://git@github.com/pennersr/django-allauth@main",
    "django-filter @ git+ssh://git@github.com/carltongibson/django-filter@main",
    "django-mongodb-app @ git+ssh://git@github.com/mongodb-labs/django-mongodb-app@main",
    "django-mongodb-backend @ git+ssh://git@github.com/mongodb-labs/django-mongodb-backend@main",
    "django-mongodb-project @ git+ssh://git@github.com/mongodb-labs/django-mongodb-project@main",
    "django-rest-framework @ git+ssh://git@github.com/encode/django-rest-framework@main",
    "django @ git+ssh://git@github.com/mongodb-forks/django@mongodb-5.0.x # upstream: mongodb-forks",
    "pymongo @ git+ssh://git@github.com/mongodb/mongo-python-driver@master # upstream: mongodb",
    "wagtail @ git+ssh://git@github.com/wagtail/wagtail@main",
    "wagtail-mongodb-project @ git+ssh://git@github.com/aclark4life/wagtail-mongodb-project@main",
]

[project.scripts]
django-mongodb-cli = "django_mongodb_cli:cli"
